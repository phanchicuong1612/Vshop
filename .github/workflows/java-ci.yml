name: Java CI Pipeline

# Pipeline sẽ chạy khi có code push hoặc tạo pull request vào nhánh 'main'
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # Chạy trên môi trường Linux mới nhất

    steps:
    # Bước 1: Lấy code từ GitHub về môi trường chạy
    - name: Checkout repository
      uses: actions/checkout@v3

    # Bước 2: Cài đặt Java JDK (Ở đây dùng bản 17, bạn có thể đổi thành 8, 11, 21 tuỳ dự án)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven # Tối ưu hoá thời gian chạy bằng cách cache lại thư viện Maven

    # Bước 3: Chạy lệnh build và test bằng Maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml
