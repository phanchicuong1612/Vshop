name: Chạy Code Java Trực Tiếp

on:
  push:
    branches: [ "main" ]

jobs:
  run-java:
    runs-on: ubuntu-latest

    steps:
    # 1. Lấy code từ GitHub về
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. Cài đặt môi trường Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Chạy trực tiếp file Java (Không cần dùng Maven)
    - name: Chạy VShopPaymentService
      run: |
        echo "Đang biên dịch và chạy file Java..."
        java VShopPaymentService.java
